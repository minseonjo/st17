<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Gradient</title>
    <!-- 
    프롬프트
    html, css 코드로 첨부된 이미지처럼 오로라 메시 그라디언트 배경을 만들어줘

    요구사항:
    - 생성요소는 .exam으로 해주고
    - 브라우저의 viewport 크기와 동일한 크기가 되게 해줘 (100% × 100vh)
    - HTML 구조는 완전한 HTML5 문서 구조로 해주고
    - 모든 스타일은 <style> 태그로 분리해줘 (인라인 스타일 금지)
    - CSS로 메시 그라디언트 효과를 만들어줘
    - 애니메이션은 적용하지 말고 static으로 만들어줘
    - 색상 구성: #2BEBFC + #7022D6 + #FFF41C + #EC0087 +#008080

    - 이미지의 텍스트는 위치만 잡아주면 내가 텍스트 내용은 수정할게
    - 텍스트는 선명하게 보여야하니까 그라디언트를 주는 요소와 텍스트를 작성하는  html 요소를 분리해서작성해줘

    이 프롬프트와 오로라그라디언트.png를 참고해서 gradient3.html에 aurora gradient를 만들어줘.
    -->
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .exam {
            width: 100%;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, #2BEBFC 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, #7022D6 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, #FFF41C 0%, transparent 40%),
                radial-gradient(circle at 10% 85%, #EC0087 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, #008080 0%, transparent 60%),
                radial-gradient(ellipse at 30% 60%, #7022D6 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, #EC0087 0%, transparent 45%),
                linear-gradient(135deg, #2BEBFC 0%, #7022D6 25%, #FFF41C 50%, #EC0087 75%, #008080 100%);
            background-blend-mode: screen, screen, screen, screen, multiply, screen, screen, normal;
            position: relative;
        }

        .text-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .text-container h1 {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .text-container p {
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="exam">
        <div class="text-container">
            <h1>GRADIENT</h1>
            <p>COVER DESIGN</p>
        </div>
    </div>
</body>
</html>
