<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수평수직 가운데 만들기</title>
    <!-- 웹폰트 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <!-- 
    .nanum-pen-script-regular {
    font-family: "Nanum Pen Script", cursive;
    font-weight: 400;
    font-style: normal;
    }

    .noto-sans-kr-<uniquifier> {
    font-family: "Noto Sans KR", sans-serif;
    font-optical-sizing: auto;
    font-weight: <weight>;
    font-style: normal;
    }
    -->
    <style>
        *{margin: 0; padding: 0; box-sizing: border-box;}
        .exam{
            /* 브라우저 수평, 수직 가득 사용하기 */
            width: 100%;
            height: 100vh;
            background-color: #ccc;
            /* 4. 인라인 .text-wrap 수평 정렬 */
            text-align: center;
            /* 6. 자식의 수직 정렬을 가운데 */
            align-content: center;
            /* gradient */
            /*
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(231, 202, 14, 0.4) 0%, transparent 60%),
                radial-gradient(circle at 30% 80%, rgba(138, 43, 226, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 70% 20%, rgba(0, 255, 200, 0.4) 0%, transparent 55%),
                linear-gradient(135deg, #1a0033 0%, #001a33 50%, #1a1a00 100%);
            background-size: 200% 200%;
            background-attachment: fixed;
            */
            background: 
                radial-gradient(circle at 20% 30%, #2BEBFC 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, #7022D6 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, #FFF41C 0%, transparent 40%),
                radial-gradient(circle at 10% 85%, #EC0087 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, #008080 0%, transparent 60%),
                radial-gradient(ellipse at 30% 60%, #7022D6 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, #EC0087 0%, transparent 45%),
                linear-gradient(135deg, #2BEBFC 0%, #7022D6 25%, #FFF41C 50%, #EC0087 75%, #008080 100%);
            background-blend-mode: screen, screen, screen, screen, multiply, screen, screen, normal;
        }
        .exam .text-wrap{
            /* 3. 너비를 자식의 크기만큼만 */
            display: inline-block;
            /* 
            블록레벨의 정렬
            margin: 0 auto;
            -> 여기선 쓸 수 없음
            */
        }
        .exam .text-wrap .title{
            /* 1. 웹폰트 Nanum Pen Script */
            font-family: "Nanum Pen Script", cursive;
            font-size: 200px;
            /* font-weight: bold; */
            color: #fff;
            /* 2. 자간 */
            letter-spacing: 30px;
            /* 5. 텍스트 그림자 */
            /* text-shadow: 10px 10px 5px rgba(110, 67, 252, 0.8); */
            text-shadow: 14px 4px 10px rgba(110, 67, 252, 0.8);
            text-shadow: 14px 4px 10px rgba(26, 6, 249, 0.8);
        }
        .exam .text-wrap .desc{
            /* 1. 웹폰트 Noto Sans KR */
            font-family: "Noto Sans KR", sans-serif;
            font-size: 30px;
            /* margin은 음수 값 줄 수 있다 */
            margin-top: -50px;
            /* 2. 자간 */
            letter-spacing: 9px;
            font-weight: 100;
            
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- .exam>.text-wrap>div.title+div.desc -->
    <div class="exam">
        <div class="text-wrap">
            <div class="title">SALE</div>
            <div class="desc">여름을 전하는 감사 인사</div>
        </div>
    </div>
</body>
</html>
