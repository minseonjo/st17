<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다중배경이미지</title>
    <style>
        *{margin: 0; padding: 0;}
        .box{
            width: 100%;
            height: 100vh;
            background-color: #ccc;
            /* 구분자는 콤마(,) */
            background-image: 
            url(images/sun.png),
            url(images/field2.png),
            url(images/flower.png)
            ;

            background-repeat: 
            no-repeat,
            repeat-x,
            repeat-x
            ;

            background-position: 
            100% 50px,
            /* 50% 100%와 같은 표현 */
            center bottom,
            50% 100% 
            ;
            
            background-size: 
            auto,
            40%,
            30%
            ;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
