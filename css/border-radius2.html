<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border-radius2</title>
    <style>
        *{margin: 0; padding: 0;}
        body{
            margin: 50px;
        }
        .box{
            width: 300px;
            height: 400px;
            border: 1px solid #000;
            border-radius: 50px;
            overflow: hidden;
        }
        .child{
            background-color: rgba(255, 0, 0, 0.5);
            /* 부모의 크기와 동일 */
            /* % 단위는 부모의 크기를 기준  */
            height: 100%;
        }
        /* 
        자식의 크기가 부모 크기보다 넘쳐날 때
        overflow
        */
    </style>
</head>
<body>
    <div class="box">
        <div class="child">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Earum esse cumque exercitationem rem! Incidunt rerum unde, nisi consequuntur nobis enim animi dolorum tempora est natus aperiam porro? Alias, qui repudiandae.20</div>
    </div>
</body>
</html>
