<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오로라 메시 그라디언트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .exam {
            width: 100%;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(231, 202, 14, 0.4) 0%, transparent 60%),
                radial-gradient(circle at 30% 80%, rgba(138, 43, 226, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 70% 20%, rgba(0, 255, 200, 0.4) 0%, transparent 55%),
                linear-gradient(135deg, #1a0033 0%, #001a33 50%, #1a1a00 100%);
            background-size: 200% 200%;
            background-attachment: fixed;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="exam"></div>
    <div class="text-container">
        <h1>Aurora Mesh Gradient</h1>
        <p>텍스트 내용을 여기서 수정해주세요</p>
    </div>
</body>
</html>
