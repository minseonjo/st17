<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-image</title>
    <style>
        *{margin: 0; padding: 0;}
        .box{
            height: 300px;
            border: 10px dotted rgba(0, 0, 0, 0.5);
            background-color: #ff3;
            background-image: url(images/flower.png);
            background-image: url(images/bg.jpg);
            /* none : 기본값, 초기값 */
            background-image: none;
            /* 
            배경 이미지의 크기가 요소보다 작을 경우에는 반복
            배경 이미지가 요소보다 클 경우는 요소 크기만큼만 표시
            배경 이미지도 기본이 테두리부터
            배경 이미지가 보이지 않는 부분은 배경색으로 표현
            */
        }
        .box1{
            /* px 단위, 고정 크기 */
            width: 500px;
        }
        .box2{
            /* 
            부모의 크기가 기준
            부모의 크기가 달라지면 %도 달라짐
             */
            width: 80%;
        }
        .box3{
            /* 
            40em -> 부모 글자 크기의 40배, 부모의 글자 크기가 기준
            반응형 웹일 경우 부모 글자 크기가 달라질 수 있음 -> 상대크기
            */
            width: 40em;
        }
    </style>
</head>
<body>
    <!-- .container-wrap>.box.box$*3>{box$} -->
    <div class="container-wrap">
        <div class="box box1">box1</div>
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
    </div>
</body>
</html>
