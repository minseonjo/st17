<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradient</title>
    <style>
        *{margin: 0; padding: 0;}
        .exam{
            box-sizing: border-box;
            width: 100%;
            height: 50vh;
            background-color: #ccc;
            background: #FF0000;
            background: linear-gradient(90deg, rgba(255, 0, 0, 1) 0%, rgba(0, 0, 255, 1) 50%, rgba(255, 255, 0, 1) 100%);
        }
    </style>
</head>
<body>
    <div class="exam"></div>
</body>
</html>
